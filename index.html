<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberMentor AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    flex-shrink: 0;
  }
  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #00d2ff, #7b2ff7);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  header h1 { font-size: 17px; font-weight: 600; color: #e6edf3; }
  header span { font-size: 12px; color: #7d8590; margin-left: 2px; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #3fb950; margin-left: auto;
    box-shadow: 0 0 6px #3fb95066;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .topic-bar {
    display: flex; gap: 8px; padding: 10px 20px;
    background: #161b22; border-bottom: 1px solid #21262d;
    overflow-x: auto; flex-shrink: 0;
  }
  .topic-bar::-webkit-scrollbar { height: 0; }
  .pill {
    padding: 5px 13px; border-radius: 20px; font-size: 12px;
    cursor: pointer; white-space: nowrap; border: 1px solid #30363d;
    background: transparent; color: #8b949e; transition: all .2s;
  }
  .pill:hover, .pill.active {
    background: #1f6feb22; border-color: #1f6feb; color: #58a6ff;
  }
  #chat {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 16px;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }
  .msg { display: flex; gap: 10px; max-width: 820px; animation: fadeIn .25s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  .msg.user { flex-direction: row-reverse; align-self: flex-end; }
  .msg.bot  { align-self: flex-start; }
  .avatar {
    width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; margin-top: 2px;
  }
  .avatar.bot { background: linear-gradient(135deg, #00d2ff22, #7b2ff722); border: 1px solid #30363d; }
  .avatar.user { background: #21262d; border: 1px solid #30363d; }
  .bubble {
    padding: 12px 16px; border-radius: 12px;
    font-size: 14px; line-height: 1.6; max-width: 680px;
  }
  .msg.user .bubble {
    background: #1f6feb; color: #fff; border-radius: 12px 4px 12px 12px;
  }
  .msg.bot .bubble {
    background: #161b22; border: 1px solid #21262d;
    color: #e6edf3; border-radius: 4px 12px 12px 12px;
  }
  .bubble code {
    background: #0d1117; padding: 1px 5px; border-radius: 4px;
    font-family: 'Courier New', monospace; font-size: 13px; color: #79c0ff;
    border: 1px solid #21262d;
  }
  .bubble pre {
    background: #0d1117; padding: 12px; border-radius: 8px; margin: 8px 0;
    border: 1px solid #21262d; overflow-x: auto;
  }
  .bubble pre code {
    background: none; border: none; padding: 0;
    font-size: 12.5px; color: #a5d6ff; display: block; line-height: 1.5;
  }
  .bubble strong { color: #79c0ff; font-weight: 600; }
  .bubble em { color: #d2a8ff; }
  .bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
  .bubble li { margin: 3px 0; }
  .bubble h3 { font-size: 14px; font-weight: 600; color: #58a6ff; margin: 10px 0 4px; }
  .bubble h4 { font-size: 13px; font-weight: 600; color: #d2a8ff; margin: 8px 0 4px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .chip {
    padding: 5px 12px; border-radius: 20px; font-size: 12px;
    background: #21262d; border: 1px solid #30363d; color: #8b949e;
    cursor: pointer; transition: all .2s;
  }
  .chip:hover { background: #1f6feb22; border-color: #1f6feb; color: #58a6ff; }
  .typing { display: flex; align-items: center; gap: 4px; padding: 10px 0; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: #58a6ff; animation: blink 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,100%{opacity:.2} 50%{opacity:1} }
  .input-bar {
    padding: 14px 20px; background: #161b22; border-top: 1px solid #21262d;
    display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0;
  }
  textarea {
    flex: 1; background: #0d1117; border: 1px solid #30363d;
    border-radius: 10px; padding: 10px 14px; color: #e6edf3;
    font-size: 14px; font-family: inherit; resize: none; line-height: 1.5;
    max-height: 120px; transition: border-color .2s; outline: none;
  }
  textarea:focus { border-color: #1f6feb; }
  textarea::placeholder { color: #484f58; }
  button#sendBtn {
    width: 40px; height: 40px; border-radius: 8px;
    background: #1f6feb; border: none; color: #fff;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all .15s; font-size: 16px;
  }
  button#sendBtn:hover { background: #388bfd; }
  button#sendBtn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
  .mode-toggle {
    display: flex; gap: 4px; background: #0d1117;
    border: 1px solid #21262d; border-radius: 8px; padding: 3px;
  }
  .mode-btn {
    padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: 500;
    cursor: pointer; border: none; background: transparent;
    color: #7d8590; transition: all .2s;
  }
  .mode-btn.active { background: #21262d; color: #e6edf3; }
</style>
</head>
<body>

<header>
  <div class="logo">🛡️</div>
  <div>
    <h1>CyberMentor AI <span>by Anthropic</span></h1>
  </div>
  <div class="status-dot"></div>
</header>

<div class="topic-bar">
  <div class="pill active" onclick="selectTopic(this,'all')">All Topics</div>
  <div class="pill" onclick="selectTopic(this,'networking')">🌐 Networking</div>
  <div class="pill" onclick="selectTopic(this,'web')">🕸️ Web Security</div>
  <div class="pill" onclick="selectTopic(this,'cryptography')">🔐 Cryptography</div>
  <div class="pill" onclick="selectTopic(this,'malware')">🦠 Malware Analysis</div>
  <div class="pill" onclick="selectTopic(this,'pentest')">⚔️ Pentesting</div>
  <div class="pill" onclick="selectTopic(this,'forensics')">🔍 Digital Forensics</div>
  <div class="pill" onclick="selectTopic(this,'ctf')">🏁 CTF Tips</div>
  <div class="pill" onclick="selectTopic(this,'soc')">🖥️ SOC / Blue Team</div>
</div>

<div id="chat"></div>

<div class="input-bar">
  <div style="display:flex;flex-direction:column;gap:6px;flex:1">
    <div class="mode-toggle">
      <button class="mode-btn active" id="modeTheory" onclick="setMode('theory')">📖 Theory</button>
      <button class="mode-btn" id="modePractical" onclick="setMode('practical')">💻 Practical</button>
      <button class="mode-btn" id="modeLab" onclick="setMode('lab')">🧪 Lab / CTF</button>
    </div>
    <textarea id="input" rows="1" placeholder="Ask anything about cybersecurity..." oninput="autoResize(this)"></textarea>
  </div>
  <button id="sendBtn" onclick="sendMessage()">➤</button>
</div>

<script>
const SYSTEM_PROMPT = `You are CyberMentor AI, an expert cybersecurity educator. You help students learn BOTH theoretical and practical cybersecurity skills.

Your style:
- Be clear, structured, and educational
- Use **bold** for key terms, \`code\` for commands/tools/syntax
- Use practical examples, real command-line snippets, and hands-on exercises
- Include lab exercises when relevant
- For practical topics, always give step-by-step commands they can practice
- Always note ethical/legal considerations for offensive techniques
- Adapt your depth to the student's apparent level
- When in "practical" mode, lead with hands-on commands and tools
- When in "theory" mode, explain concepts, history, and underlying mechanisms deeply
- When in "lab/CTF" mode, give hints, walkthroughs, and practice challenges

Format responses clearly. Use headers (###) for sections, bullet points for lists, code blocks for commands.

Always end responses with 1-3 suggested follow-up questions to guide further learning.`;

let mode = 'theory';
let activeTopic = 'all';
let history = [];

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mode' + m.charAt(0).toUpperCase() + m.slice(1)).classList.add('active');
}

function selectTopic(el, topic) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  activeTopic = topic;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function formatMessage(text) {
  return text
    .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${code.trim().replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
    .replace(/\n{2,}/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

function addMessage(role, content, chips = []) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = `<div class="avatar ${role}">${role === 'bot' ? '🛡️' : '👤'}</div>`;
  let chipsHtml = '';
  if (chips.length) {
    chipsHtml = `<div class="chips">${chips.map(c =>
      `<div class="chip" onclick="quickAsk('${c.replace(/'/g,"&#39;")}')">${c}</div>`
    ).join('')}</div>`;
  }
  div.innerHTML = `${avatar}<div class="bubble">${formatMessage(content)}${chipsHtml}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing-indicator';
  div.innerHTML = `<div class="avatar bot">🛡️</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function sendMessage(overrideText) {
  const input = document.getElementById('input');
  const text = (overrideText || input.value).trim();
  if (!text) return;

  input.value = ''; input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;

  const topicCtx = activeTopic !== 'all' ? ` [Topic focus: ${activeTopic}]` : '';
  const modeCtx = `[Learning mode: ${mode}]`;
  const userMsg = `${modeCtx}${topicCtx}\n\n${text}`;

  addMessage('user', text);
  history.push({ role: 'user', content: userMsg });
  addTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history, system: SYSTEM_PROMPT })
    });

    const data = await res.json();
    const reply = data?.content?.[0]?.text || 'Sorry, I could not generate a response. Please try again.';
    history.push({ role: 'assistant', content: reply });
    removeTyping();

    const followUps = [];
    const lines = reply.split('\n');
    for (const line of lines) {
      const m = line.match(/^[-*•]\s*(.+\?)$/);
      if (m && followUps.length < 3) followUps.push(m[1].trim());
    }
    addMessage('bot', reply, followUps);
  } catch (e) {
    removeTyping();
    addMessage('bot', '⚠️ Connection error. Please try again.');
  }

  document.getElementById('sendBtn').disabled = false;
}

function quickAsk(text) {
  document.getElementById('input').value = text;
  sendMessage();
}

document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

window.addEventListener('load', () => {
  addMessage('bot',
    `### Welcome to CyberMentor AI 👋\n\nI'm your personal cybersecurity tutor powered by Claude. I can teach you **theory**, walk you through **practical labs**, and help you crack **CTF challenges**.\n\nHere's what I can help you with:\n\n- 🌐 **Networking** — TCP/IP, packet analysis, protocols\n- 🕸️ **Web Security** — OWASP Top 10, XSS, SQLi, SSRF\n- 🔐 **Cryptography** — algorithms, PKI, attacks\n- ⚔️ **Penetration Testing** — enumeration, exploitation, post-exploitation\n- 🦠 **Malware Analysis** — static & dynamic analysis techniques\n- 🔍 **Digital Forensics** — disk, memory, network forensics\n- 🏁 **CTF Challenges** — strategy and walkthroughs\n- 🖥️ **SOC / Blue Team** — SIEM, threat hunting, incident response\n\nUse the **mode buttons** (Theory / Practical / Lab) to control my teaching style. Where would you like to start?`,
    ['Explain the OSI model', 'How does SQL injection work?', 'Give me a beginner CTF challenge', 'What tools do pentesters use?']
  );
});
</script>
</body>
</html>
